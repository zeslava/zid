version: "3"

# Taskfile for local development and Docker stack management.
# Loads environment variables from `.env` (and optionally `.env.local`) into Task.
dotenv:
  - .env
  - .env.local

vars:
  DC: docker compose

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  build:
    desc: Build Rust application locally
    cmds:
      - cargo build --release

  run:
    desc: Run Rust application locally
    deps: [build]
    cmds:
      - ./target/release/zid

  up:
    desc: Start Docker services (detached)
    cmds:
      - "{{.DC}} up -d"
      - "{{.DC}} ps"
      - echo ""
      - 'echo "Services started"'

  down:
    desc: Stop Docker services
    cmds:
      - "{{.DC}} down"

  migrate:
    desc: Run database migrations (sqlx-cli)
    cmds:
      - sqlx migrate run

  migrate-add:
    desc: Add new migration (pass NAME, e.g. task migrate-add NAME=create_users)
    cmds:
      - 'sqlx migrate add "{{.NAME}}"'

  migrate-revert:
    desc: Revert last migration (sqlx-cli)
    cmds:
      - sqlx migrate revert
