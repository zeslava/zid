version: "3"

# Taskfile for local development and Docker stack management.
# Loads environment variables from `.env` (and optionally `.env.local`) into Task.
dotenv:
  - .env
  - .env.local

vars:
  DC: docker compose

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  build:
    desc: Build Rust application locally
    cmds:
      - cargo build --release

  run:
    desc: Run Rust application locally
    deps: [build]
    dir: .
    cmds:
      - ./target/release/zid

  up:
    desc: Start Docker services (detached)
    cmds:
      - "{{.DC}} up -d"
      - "{{.DC}} ps"
      - echo ""
      - 'echo "Services started"'

  down:
    desc: Stop Docker services
    cmds:
      - "{{.DC}} down"

  migrate:
    desc: Run database migrations (sqlx-cli)
    cmds:
      - sqlx migrate run --database-url "${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-zid}}"

  migrate-add:
    desc: Add new migration (pass NAME, e.g. task migrate-add NAME=create_users)
    cmds:
      - 'sqlx migrate add "{{.NAME}}"'

  migrate-revert:
    desc: Revert last migration (sqlx-cli)
    cmds:
      - sqlx migrate revert --database-url "${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-zid}}"

  install-freebsd:
    desc: Установка ZID на FreeBSD (скрипт scripts/setup-freebsd.sh; для установки нужен sudo task install-freebsd)
    deps: [build]
    cmds:
      - ./scripts/setup-freebsd.sh target/release/zid

  oidc-gen-keys:
    desc: Сгенерировать PEM-ключи для OIDC JWT (private + public)
    cmds:
      - openssl genrsa -out oidc_jwt_private.pem 2048
      - openssl rsa -in oidc_jwt_private.pem -pubout -out oidc_jwt_public.pem
      - 'echo "Ключи сохранены: oidc_jwt_private.pem, oidc_jwt_public.pem"'
