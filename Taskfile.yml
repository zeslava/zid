version: "3"

# Minimal Taskfile: only commands for running the stack.
# Loads environment variables from `.env` (and optionally `.env.local`) into Task.
dotenv:
  - .env
  - .env.local

vars:
  DC: docker compose

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  build:
    desc: Build containers
    cmds:
      - "{{.DC}} build"

  up:
    desc: Start services (detached)
    cmds:
      - "{{.DC}} up -d"
      - "{{.DC}} ps"
      - echo ""
      - 'echo "Application: http://localhost:5555"'

  dev:
    desc: Start services in foreground
    cmds:
      - "{{.DC}} up"

  start:
    desc: Build + start services (detached)
    deps: [build, up]

  down:
    desc: Stop services
    cmds:
      - "{{.DC}} down"

  restart:
    desc: Restart services
    cmds:
      - "{{.DC}} restart"

  logs:
    desc: Tail logs for all services
    cmds:
      - "{{.DC}} logs -f"

  logs-app:
    desc: Tail logs for app only
    cmds:
      - "{{.DC}} logs -f zid-app"
