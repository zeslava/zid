[package]
name = "zid"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
argon2 = "0.5"
axum = "0.8.7"
postgres = "0.19"
r2d2 = "0.8"
r2d2_postgres = "0.18"
rand_core = { version = "0.6", features = ["getrandom"] }
redis = "0.27"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["full"] }
url = "2.5.7"
uuid = { version = "1.19.0", features = ["v4"] }
